<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AR Experience</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  
  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      position: fixed;
      top: 0;
      left: 0;
    }

    /* Hide A-Frame's default UI */
    .a-enter-vr,
    .a-orientation-modal {
      display: none !important;
    }

    /* ===== Permission Overlay ===== */
    #permission-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 20px;
      transition: opacity 0.5s ease;
    }

    #permission-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-icon {
      width: 100px;
      height: 100px;
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
    }

    .overlay-title {
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
    }

    .overlay-desc {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
    }

    #start-btn {
      background: #6C5CE7;
      color: #fff;
      border: none;
      width: 100%;
      max-width: 300px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 10px;
      -webkit-appearance: none;
    }

    #start-btn:active {
      background: #5A4BD1;
    }

    /* ===== Error Screen ===== */
    #error-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #error-screen.visible {
      opacity: 1;
      pointer-events: all;
    }

    .error-icon { font-size: 60px; }
    
    .error-title {
      color: #FF6B6B;
      font-size: 20px;
      font-weight: 700;
    }

    .error-msg {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
    }

    #retry-btn {
      background: transparent;
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.3);
      width: 100%;
      max-width: 250px;
      padding: 14px;
      font-size: 15px;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 10px;
      -webkit-appearance: none;
    }

    /* ===== Loading ===== */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 500;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #loading-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #6C5CE7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      color: #fff;
      font-size: 13px;
    }

    /* ===== Marker Prompt ===== */
    #marker-prompt {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(0,0,0,0.75);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      color: #fff;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #marker-prompt.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(20px);
      pointer-events: none;
    }

    /* ===== Debug Info (remove in production) ===== */
    #debug-info {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 200;
      color: #0f0;
      font-family: monospace;
      font-size: 10px;
      background: rgba(0,0,0,0.5);
      padding: 8px;
      border-radius: 4px;
      max-width: 200px;
      word-break: break-all;
      display: none;
    }

    #debug-info.show { display: block; }
  </style>
</head>
<body>

  <!-- Debug Panel (uncomment to show) -->
  <!-- <div id="debug-info" class="show"></div> -->

  <!-- Permission Overlay -->
  <div id="permission-overlay">
    <div class="overlay-icon">📷</div>
    <h1 class="overlay-title">AR Viewer</h1>
    <p class="overlay-desc">Point your camera at a Hiro marker to see 3D content appear.</p>
    <button id="start-btn">Start Camera</button>
  </div>

  <!-- Error Screen -->
  <div id="error-screen">
    <div class="error-icon">⚠️</div>
    <h2 class="error-title">Something went wrong</h2>
    <p class="error-msg" id="error-msg">Camera access is required.</p>
    <button id="retry-btn">Try Again</button>
  </div>

  <!-- Loading -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <span class="loading-text" id="loading-text">Starting camera...</span>
  </div>

  <!-- Marker Prompt -->
  <div id="marker-prompt" class="hidden">Scan Hiro marker</div>

  <!-- 
    AR SCENE 
    - NO arjs attribute initially (set via JS)
    - NO embedded attribute (causes Android issues)
    - loading-screen disabled
  -->
  <a-scene
    id="ar-scene"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true; precision: medium"
    loading-screen="enabled: false"
  >
    <a-assets timeout="15000">
      <a-asset-item id="car-model" src="car.glb"></a-asset-item>
    </a-assets>

    <a-marker
      id="ar-marker"
      preset="hiro"
      emitevents="true"
      smooth="true"
      smoothCount="5"
      smoothTolerance="0.01"
      smoothThreshold="5"
    >
      <a-entity
        id="model-entity"
        gltf-model="#car-model"
        scale="0.1 0.1 0.1"
        position="0 0.15 0"
        rotation="0 -90 0"
      ></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
  (function() {
    "use strict";

    // ============================================
    // CONFIG
    // ============================================
    const CONFIG = {
      debug: false,
      loadingTimeout: 8000,
      arInitTimeout: 12000,
      cameraInitRetries: 2,
    };

    // ============================================
    // DOM
    // ============================================
    const $ = id => document.getElementById(id);
    
    const dom = {
      overlay:     $('permission-overlay'),
      error:       $('error-screen'),
      errorMsg:    $('error-msg'),
      loading:     $('loading-overlay'),
      loadingText: $('loading-text'),
      prompt:      $('marker-prompt'),
      startBtn:    $('start-btn'),
      retryBtn:    $('retry-btn'),
      scene:       $('ar-scene'),
      marker:      $('ar-marker'),
      model:       $('model-entity'),
      debug:       $('debug-info'),
    };

    // ============================================
    // STATE
    // ============================================
    const state = {
      started: false,
      arReady: false,
      markerVisible: false,
      modelLoaded: false,
    };

    // ============================================
    // DEBUG LOGGER
    // ============================================
    function log(msg) {
      console.log('[AR]', msg);
      if (CONFIG.debug && dom.debug) {
        dom.debug.textContent += msg + '\n';
      }
    }

    // ============================================
    // UI HELPERS
    // ============================================
    function showLoading(text) {
      if (text) dom.loadingText.textContent = text;
      dom.loading.classList.add('visible');
    }

    function hideLoading() {
      dom.loading.classList.remove('visible');
    }

    function showError(msg) {
      dom.errorMsg.textContent = msg || 'An unknown error occurred.';
      dom.error.classList.add('visible');
      dom.overlay.classList.add('hidden');
      hideLoading();
    }

    function showPrompt() {
      dom.prompt.classList.remove('hidden');
    }

    function hidePrompt() {
      dom.prompt.classList.add('hidden');
    }

    // ============================================
    // ANDROID DETECTION
    // ============================================
    function isAndroid() {
      return /Android/i.test(navigator.userAgent);
    }

    function isIOS() {
      return /iPhone|iPad|iPod/i.test(navigator.userAgent);
    }

    function isMobile() {
      return isAndroid() || isIOS() || /Mobile/i.test(navigator.userAgent);
    }

    // ============================================
    // CHECK REQUIREMENTS
    // ============================================
    function checkRequirements() {
      log('Checking requirements...');
      
      // Check HTTPS
      if (location.protocol !== 'https:' && 
          location.hostname !== 'localhost' && 
          location.hostname !== '127.0.0.1' &&
          location.hostname !== '') {
        throw new Error('This app requires HTTPS. Please access via a secure URL.');
      }

      // Check getUserMedia
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error('Your browser doesn\'t support camera access. Try Chrome or Firefox.');
      }

      // Check WebGL
      const canvas = document.createElement('canvas');
      const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      if (!gl) {
        throw new Error('WebGL is not available on your device.');
      }

      log('Requirements OK');
      return true;
    }

    // ============================================
    // WAIT FOR AR.JS TO BE READY
    // ============================================
    function waitForARSystem(timeout) {
      return new Promise((resolve, reject) => {
        log('Waiting for AR system...');
        
        const startTime = Date.now();
        
        const check = () => {
          // Try to get AR system
          if (dom.scene.systems && dom.scene.systems['arjs']) {
            const arSys = dom.scene.systems['arjs'];
            
            // On Android, also check if video is actually playing
            if (isAndroid()) {
              const video = arSys._arVideoSource && arSys._arVideoSource.video;
              if (video && video.readyState >= 2) {
                log('AR system ready (Android verified)');
                resolve(arSys);
                return;
              }
            } else {
              log('AR system ready');
              resolve(arSys);
              return;
            }
          }
          
          // Check timeout
          if (Date.now() - startTime > timeout) {
            reject(new Error('AR initialization timed out.'));
            return;
          }
          
          // Check again
          requestAnimationFrame(check);
        };
        
        check();
      });
    }

    // ============================================
    // INITIALIZE AR.JS
    // ============================================
    async function initAR() {
      log('Initializing AR.js...');
      showLoading('Initializing AR...');

      // Build AR.js config string
      // NOTE: Don't specify sourceType on mobile - let AR.js figure it out
      let arjsConfig = 'debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3; preset: hiro';
      
      if (!isMobile()) {
        arjsConfig = 'sourceType: webcam; ' + arjsConfig;
      }

      log('Config: ' + arjsConfig);

      // Set AR.js attribute
      dom.scene.setAttribute('arjs', arjsConfig);

      // Wait for system to initialize
      try {
        await waitForARSystem(CONFIG.arInitTimeout);
        state.arReady = true;
        log('AR.js initialized successfully');
      } catch (err) {
        log('AR init failed: ' + err.message);
        throw err;
      }
    }

    // ============================================
    // SETUP MARKER EVENTS
    // ============================================
    function setupMarkerEvents() {
      if (!dom.marker) {
        log('WARNING: Marker element not found');
        return;
      }

      dom.marker.addEventListener('markerFound', () => {
        log('Marker FOUND');
        state.markerVisible = true;
        hidePrompt();
        hideLoading();
      });

      dom.marker.addEventListener('markerLost', () => {
        log('Marker LOST');
        state.markerVisible = false;
        if (!state.modelLoaded) {
          showPrompt();
        }
      });
    }

    // ============================================
    // SETUP MODEL EVENTS
    // ============================================
    function setupModelEvents() {
      if (!dom.model) {
        log('WARNING: Model element not found');
        return;
      }

      const onLoaded = () => {
        log('Model LOADED');
        state.modelLoaded = true;
        hideLoading();
        if (!state.markerVisible) {
          showPrompt();
        }
      };

      const onError = (e) => {
        log('Model LOAD ERROR: ' + (e.detail || 'unknown'));
        hideLoading();
        showPrompt();
      };

      // Check if already loaded
      if (dom.model.hasLoaded) {
        onLoaded();
        return;
      }

      dom.model.addEventListener('model-loaded', onLoaded);
      dom.model.addEventListener('model-error', onError);
    }

    // ============================================
    // HANDLE CAMERA-INIT EVENT (AR.js fires this)
    // ============================================
    function setupCameraInitListener() {
      dom.scene.addEventListener('camera-init', () => {
        log('Camera initialized (AR.js event)');
        showLoading('Camera ready...');
      });

      dom.scene.addEventListener('camera-error', (e) => {
        log('Camera error (AR.js event): ' + JSON.stringify(e.detail));
        showError('Could not access camera. Please check permissions.');
      });
    }

    // ============================================
    // MAIN START
    // ============================================
    async function start() {
      if (state.started) return;
      state.started = true;

      log('--- START ---');
      log('Platform: ' + (isAndroid() ? 'Android' : isIOS() ? 'iOS' : 'Desktop'));
      log('UserAgent: ' + navigator.userAgent.substring(0, 50) + '...');

      try {
        // 1. Check requirements
        showLoading('Checking device...');
        checkRequirements();

        // 2. Hide permission overlay
        dom.overlay.classList.add('hidden');

        // 3. Setup event listeners BEFORE initializing
        setupCameraInitListener();
        setupMarkerEvents();
        setupModelEvents();

        // 4. Initialize AR.js (this handles camera permission)
        if (isAndroid()) {
          showLoading('Requesting camera permission...');
        }
        
        await initAR();

        // 5. Show prompt
        showLoading('Looking for marker...');
        showPrompt();

        // 6. Safety timeout
        setTimeout(() => {
          hideLoading();
          if (!state.markerVisible) {
            showPrompt();
          }
        }, CONFIG.loadingTimeout);

        log('--- START COMPLETE ---');

      } catch (err) {
        log('FATAL: ' + err.message);
        console.error(err);
        
        // Provide helpful error messages for Android
        let userMsg = err.message;
        
        if (isAndroid()) {
          if (err.message.includes('timed out')) {
            userMsg = 'Camera initialization timed out. Try closing other apps that use the camera and reload.';
          } else if (err.message.includes('Permission')) {
            userMsg = 'Camera permission denied. Go to Settings > Apps > Chrome > Permissions and enable Camera.';
          }
        }
        
        showError(userMsg);
      }
    }

    // ============================================
    // EVENT LISTENERS
    // ============================================
    dom.startBtn.addEventListener('click', (e) => {
      e.preventDefault();
      start();
    });

    dom.retryBtn.addEventListener('click', () => {
      location.reload();
    });

    // Prevent zoom on double-tap (Android)
    document.addEventListener('dblclick', (e) => {
      e.preventDefault();
    }, { passive: false });

    // Prevent pinch zoom (Android)
    document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 1) {
        e.preventDefault();
      }
    }, { passive: false });

    // ============================================
    // INITIAL STATE
    // ============================================
    dom.overlay.classList.remove('hidden');
    dom.error.classList.remove('visible');
    dom.loading.classList.remove('visible');
    dom.prompt.classList.add('hidden');

    if (CONFIG.debug) {
      dom.debug.classList.add('show');
    }

    log('App ready');

  })();
  </script>

</body>
</html>

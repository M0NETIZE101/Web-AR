<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Web AR · Marker Demo</title>
  <!-- Load A-Frame core and AR.js -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .info {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      text-align: center;
      color: white;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
      pointer-events: none;
      z-index: 10;
      font-size: 1rem;
      padding: 0 16px;
      box-sizing: border-box;
    }
    .info a {
      color: #88ddff;
      pointer-events: auto;
      text-decoration: none;
      font-weight: 500;
    }
    .info a:hover {
      text-decoration: underline;
    }
    /* fallback if camera not available */
    .error-message {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #ff6666;
      background: rgba(0,0,0,0.7);
      padding: 10px 18px;
      border-radius: 30px;
      font-size: 0.9rem;
      z-index: 20;
      backdrop-filter: blur(4px);
      border: 1px solid #ff8888;
      display: none;
    }
  </style>
</head>
<body>
  <!-- Error placeholder -->
  <div id="errorMsg" class="error-message">⚠️ Camera not available</div>

  <!-- AR scene -->
  <a-scene 
    embedded 
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; alpha: true"
    device-orientation-permission-ui="enabled: true"
  >
    <!-- Default marker: a 3x3 QR-like code (pattern 0) -->
    <a-marker type="pattern" url="https://raw.githack.com/AR-js-org/AR.js/master/data/data/patt.hiro">
      <!-- 3D content that appears on the marker -->
      <a-entity position="0 0 0" scale="0.5 0.5 0.5">
        <!-- A rotating colorful box with an inner glow -->
        <a-box color="#ff4d4d" depth="1" height="1" width="1" position="0 0.5 0" material="shader: flat; opacity: 0.95;">
          <a-animation attribute="rotation" from="0 0 0" to="360 360 0" dur="4000" repeat="indefinite" easing="linear"></a-animation>
        </a-box>
        <!-- A sphere on top -->
        <a-sphere color="#4dff4d" radius="0.4" position="0 1.2 0" material="metalness: 0.3; roughness: 0.4;">
          <a-animation attribute="position" from="0 1.2 0" to="0 1.8 0" dur="1200" repeat="indefinite" direction="alternate" easing="ease-in-out"></a-animation>
        </a-sphere>
        <!-- A torus ring around the box -->
        <a-torus color="#4d4dff" radius="0.8" arc="360" position="0 0.5 0" rotation="90 0 0" material="metalness: 0.5; roughness: 0.3;">
          <a-animation attribute="rotation" from="0 0 0" to="0 360 0" dur="6000" repeat="indefinite" easing="linear"></a-animation>
        </a-torus>
        <!-- floating text (always facing camera) -->
        <a-text value="WEB AR" color="#ffffff" align="center" position="0 1.9 0" scale="0.4 0.4 0.4" 
                font="https://cdn.jsdelivr.net/npm/three@0.135.0/examples/fonts/helvetiker_regular.typeface.json">
        </a-text>
      </a-entity>
    </a-marker>

    <!-- A second marker for extra fun (barcode marker, optional) – disabled by default 
         you can enable it by changing 'visible' to true and using a different marker -->
    <a-marker type="barcode" value="5" visible="false">
      <a-entity position="0 0 0" scale="0.4 0.4 0.4">
        <a-box color="#ffaa00" depth="1" height="1" width="1" position="0 0.5 0">
          <a-animation attribute="rotation" from="0 0 0" to="0 360 0" dur="3000" repeat="indefinite" easing="linear"></a-animation>
        </a-box>
        <a-sphere color="#ff66aa" radius="0.5" position="0 1.3 0"></a-sphere>
      </a-entity>
    </a-marker>

    <!-- Camera feed background (AR.js handles it) -->
    <a-entity camera></a-entity>
  </a-scene>

  <!-- Info overlay -->
  <div class="info">
    <p>📸 Show the <strong>HIRO marker</strong> (QR style) to see AR content.<br>
    <span style="opacity:0.7; font-size:0.9rem;">👉 <a href="https://raw.githack.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">Download marker image</a> or print it.</span></p>
  </div>

  <script>
    (function() {
      // Handle camera errors gracefully
      const errorDiv = document.getElementById('errorMsg');
      
      // Check if the browser supports getUserMedia
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        errorDiv.style.display = 'block';
        errorDiv.textContent = '⚠️ Your browser does not support camera access. Please use a modern browser (Chrome, Edge, Safari).';
        return;
      }

      // Check camera permission / availability on load
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => {
          // Stop the stream immediately – we just want to check permission
          stream.getTracks().forEach(track => track.stop());
          errorDiv.style.display = 'none';
        })
        .catch(err => {
          errorDiv.style.display = 'block';
          errorDiv.textContent = '⚠️ Camera access denied. Please allow camera access and reload.';
          console.warn('Camera permission error:', err);
        });

      // Additional: if AR.js fails, sometimes the scene doesn't start
      // but we can listen to the 'arjs-error' event (not always triggered)
      const scene = document.querySelector('a-scene');
      if (scene) {
        scene.addEventListener('arjs-error', (ev) => {
          errorDiv.style.display = 'block';
          errorDiv.textContent = '⚠️ AR.js error: ' + (ev.detail?.message || 'unknown error');
        });
      }
    })();
  </script>

  <!-- Ensure that the marker image is loaded correctly – 
       we also embed a small fallback note if the marker pattern fails to load -->
</body>
</html>

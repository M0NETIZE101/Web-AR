<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Web AR · Colorful Demo</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    .info {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      text-align: center;
      color: white;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
      z-index: 10;
      font-size: 1rem;
      padding: 0 16px;
      box-sizing: border-box;
      background: rgba(0,0,0,0.6);
      padding: 15px;
    }
    .info a {
      color: #88ddff;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <a-scene 
    embedded 
    arjs="sourceType: webcam; debugUIEnabled: true; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
  >
    <!-- HIRO Marker with LOTS of visible content -->
    <a-marker type="pattern" url="https://raw.githack.com/AR-js-org/AR.js/master/data/data/patt.hiro">
      
      <!-- Big Red Box - hard to miss! -->
      <a-box color="#ff0000" depth="0.8" height="0.8" width="0.8" position="0 0.4 0">
        <a-animation attribute="rotation" from="0 0 0" to="360 360 0" dur="3000" repeat="indefinite" easing="linear"></a-animation>
      </a-box>
      
      <!-- Green Sphere on Top -->
      <a-sphere color="#00ff00" radius="0.4" position="0 1 0">
        <a-animation attribute="position" from="0 1 0" to="0 1.5 0" dur="1000" repeat="indefinite" direction="alternate"></a-animation>
      </a-sphere>
      
      <!-- Blue Ring -->
      <a-torus color="#0066ff" radius="0.7" arc="360" position="0 0.4 0" rotation="90 0 0">
        <a-animation attribute="rotation" from="0 0 0" to="0 360 0" dur="4000" repeat="indefinite"></a-animation>
      </a-torus>
      
      <!-- Yellow Cylinder -->
      <a-cylinder color="#ffff00" radius="0.2" height="0.6" position="0.8 0.3 0">
        <a-animation attribute="rotation" from="0 0 0" to="0 360 0" dur="2000" repeat="indefinite"></a-animation>
      </a-cylinder>
      
      <!-- Purple Cone -->
      <a-cone color="#9900ff" radius-bottom="0.3" height="0.6" position="-0.8 0.3 0">
        <a-animation attribute="rotation" from="0 0 0" to="360 0 0" dur="2500" repeat="indefinite"></a-animation>
      </a-cone>
      
      <!-- Big Text -->
      <a-text value="🎯 HIRO!" color="#ffffff" align="center" position="0 2 0" scale="0.6 0.6 0.6"
              font="https://cdn.jsdelivr.net/npm/three@0.135.0/examples/fonts/helvetiker_regular.typeface.json">
      </a-text>
      
      <!-- Small floating particles -->
      <a-sphere color="#ff66aa" radius="0.08" position="0.5 0.8 0.5">
        <a-animation attribute="position" from="0.5 0.8 0.5" to="-0.5 1.2 -0.5" dur="2000" repeat="indefinite" direction="alternate"></a-animation>
      </a-sphere>
      <a-sphere color="#66ffaa" radius="0.08" position="-0.5 0.6 -0.5">
        <a-animation attribute="position" from="-0.5 0.6 -0.5" to="0.5 1.0 0.5" dur="2500" repeat="indefinite" direction="alternate"></a-animation>
      </a-sphere>
      
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <div class="info">
    <p>📸 Show the <strong>HIRO marker</strong> to see MULTIPLE 3D objects!<br>
    <span style="opacity:0.8; font-size:0.9rem;">👉 <a href="https://raw.githack.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">Download HIRO marker</a> | Use good lighting!</span></p>
  </div>
</body>
</html>

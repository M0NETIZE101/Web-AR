<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🚗 AR Car Showroom</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      text-align: center;
      color: white;
      text-shadow: 0 0 20px rgba(0,0,0,0.9);
      z-index: 10;
      font-size: 1rem;
      background: rgba(0,0,0,0.5);
      padding: 15px;
      backdrop-filter: blur(5px);
      pointer-events: none;
    }
    #info a {
      color: #88ddff;
      pointer-events: auto;
      text-decoration: none;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 1.5rem;
      background: rgba(0,0,0,0.7);
      padding: 20px 40px;
      border-radius: 10px;
      z-index: 20;
      text-align: center;
    }
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 10px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Loading indicator -->
  <div id="loading">
    <div class="loader"></div>
    Loading your car...
  </div>

  <a-scene 
    embedded 
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
  >
    
    <!-- HIRO Marker with your car -->
    <a-marker type="pattern" url="https://raw.githack.com/AR-js-org/AR.js/master/data/data/patt.hiro">
      
      <!-- YOUR CAR GLB MODEL from assets/models/car.glb -->
      <a-entity 
        gltf-model="url(assets/models/car.glb)"
        scale="0.5 0.5 0.5"
        position="0 0 0"
        rotation="0 0 0"
      >
        <!-- Slow rotation animation -->
        <a-animation 
          attribute="rotation" 
          from="0 0 0" 
          to="0 360 0" 
          dur="10000" 
          repeat="indefinite" 
          easing="linear"
        ></a-animation>
      </a-entity>
      
      <!-- Shadow/ground plane -->
      <a-circle color="#333" opacity="0.3" radius="0.8" position="0 0 0" rotation="-90 0 0"></a-circle>
      
      <!-- Floating text -->
      <a-text value="🚗 My Dream Car" color="white" position="0 1.2 0" scale="0.4 0.4 0.4" align="center"></a-text>
      
    </a-marker>
    
    <a-entity camera></a-entity>
  </a-scene>

  <div id="info">
    📸 Scan the <strong>HIRO marker</strong> to see your car in AR!<br>
    <span style="opacity:0.7; font-size:0.8rem;">👉 <a href="https://raw.githack.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">Download HIRO marker</a></span>
  </div>

  <script>
    // Hide loading indicator when the scene is ready
    document.addEventListener('DOMContentLoaded', () => {
      const scene = document.querySelector('a-scene');
      if (scene) {
        scene.addEventListener('loaded', () => {
          document.getElementById('loading').style.display = 'none';
        });
      }
      
      // Fallback: hide loading after 10 seconds even if not loaded
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
      }, 10000);
    });
  </script>
</body>
</html>

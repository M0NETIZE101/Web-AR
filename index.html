<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebXR — Mecha AR</title>

    <!-- A-Frame 1.4.0 -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- aframe-extras for animation-mixer -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Inter', -apple-system, sans-serif;
            position: fixed; top: 0; left: 0;
        }

        /* ===== PERMISSION OVERLAY ===== */
        #permission-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 20px; padding: 32px 24px;
            text-align: center;
            transition: opacity 0.5s ease;
            color: #fff;
        }
        #permission-overlay.hidden { opacity: 0; pointer-events: none; }
        .icon { font-size: 64px; }
        h1 { font-size: 28px; font-weight: 700; }
        p { font-size: 15px; color: rgba(255,255,255,0.6); max-width: 320px; line-height: 1.6; }
        button {
            background: #6C5CE7; color: #fff; border: none;
            padding: 16px 48px; font-size: 18px; font-weight: 600;
            border-radius: 14px; cursor: pointer; min-width: 200px;
            transition: opacity 0.2s;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ===== ERROR SCREEN ===== */
        #error-screen {
            position: fixed; inset: 0; z-index: 2000;
            background: #0a0a1a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px; padding: 32px 24px;
            text-align: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
            color: #fff;
        }
        #error-screen.visible { opacity: 1; pointer-events: all; }
        .error-icon { font-size: 56px; }
        .error-title { font-size: 22px; color: #ff6b6b; }
        .error-message { font-size: 14px; color: rgba(255,255,255,0.6); max-width: 300px; line-height: 1.6; }
        .btn-secondary {
            background: transparent; color: #fff;
            border: 2px solid rgba(255,255,255,0.2);
            padding: 14px 40px; font-size: 16px; font-weight: 500;
            border-radius: 12px; cursor: pointer;
            margin-top: 8px;
        }
        .btn-secondary:hover { border-color: rgba(255,255,255,0.5); }

        /* ===== LOADING ===== */
        #loading {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 100;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            color: #fff; padding: 12px 28px; border-radius: 40px;
            font-size: 14px; font-weight: 500;
            display: flex; align-items: center; gap: 14px;
            transition: opacity 0.4s ease; pointer-events: none;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 22px; height: 22px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #6C5CE7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== HINT ===== */
        #hint {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            z-index: 50;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: #fff; padding: 10px 24px; border-radius: 30px;
            font-size: 14px; font-weight: 500;
            border: 1px solid rgba(255,255,255,0.08);
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none;
            text-align: center;
        }
        #hint.hidden { opacity: 0; transform: translateX(-50%) translateY(20px); pointer-events: none; }

        @media (max-width: 480px) {
            h1 { font-size: 22px; }
            p { font-size: 14px; }
            button { padding: 14px 36px; font-size: 16px; min-width: 160px; }
            #loading { font-size: 12px; padding: 10px 20px; }
            #hint { font-size: 12px; padding: 8px 18px; bottom: 80px; }
        }
    </style>
</head>
<body>

    <!-- ===== PERMISSION OVERLAY ===== -->
    <div id="permission-overlay">
        <div class="icon">🤖</div>
        <h1>Mecha AR</h1>
        <p>Point your camera at a flat surface (floor, table, or ground) to place your mecha.</p>
        <button id="start-btn">Start AR</button>
    </div>

    <!-- ===== ERROR SCREEN ===== -->
    <div id="error-screen">
        <div class="error-icon">⚠️</div>
        <h2 class="error-title">Camera Access Required</h2>
        <p class="error-message" id="error-message">Camera permission was denied.</p>
        <button id="reload-btn" class="btn-secondary">🔄 Reload</button>
    </div>

    <!-- ===== LOADING ===== -->
    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <span id="loading-text">Loading AR...</span>
    </div>

    <!-- ===== HINT ===== -->
    <div id="hint" class="hidden">👆 Tap the screen to place your mecha</div>

    <!-- ===== A-FRAME SCENE (WebXR) ===== -->
    <a-scene
        id="ar-scene"
        embedded
        vr-mode-ui="enabled: false"
        renderer="antialias: true; alpha: true;"
        loading-screen="enabled: false"
        webxr="requiredFeatures: hit-test,local-floor;"
        ar-hit-test="target:#model-container;"
    >

        <!-- Lights -->
        <a-entity light="type: ambient; intensity: 0.6; color: #ffffff;"></a-entity>
        <a-entity light="type: directional; intensity: 1.0; color: #ffffff;" position="2 3 2"></a-entity>
        <a-entity light="type: directional; intensity: 0.6; color: #8888ff;" position="-1 1 -1"></a-entity>

        <!-- Model Container (hidden until placed) -->
        <a-entity id="model-container" visible="false">
            <!-- 🔥 MECHA MODEL — with walking animation -->
            <a-entity
                id="mecha-model"
                gltf-model="url(mecha.glb)"
                scale="0.3 0.3 0.3"
                rotation="0 0 0"
                animation-mixer="clip: *; loop: repeat; timeScale: 1;"
            ></a-entity>

            <!-- Subtle shadow disc -->
            <a-entity position="0 -0.02 0" rotation="-90 0 0">
                <a-circle material="color: black; transparent: true; opacity: 0.2;" radius="0.5"></a-circle>
            </a-entity>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <!-- JavaScript -->
    <script>
    (function() {
        'use strict';

        // ==========================================
        // DOM REFS
        // ==========================================
        const overlay = document.getElementById('permission-overlay');
        const startBtn = document.getElementById('start-btn');
        const errorScreen = document.getElementById('error-screen');
        const errorMessage = document.getElementById('error-message');
        const reloadBtn = document.getElementById('reload-btn');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        const hint = document.getElementById('hint');
        const scene = document.getElementById('ar-scene');
        const container = document.getElementById('model-container');

        let isARStarted = false;

        // ==========================================
        // UI HELPERS
        // ==========================================
        function showLoading(text) {
            loadingText.textContent = text || 'Loading AR...';
            loading.classList.remove('hidden');
        }

        function hideLoading() {
            loading.classList.add('hidden');
        }

        function showError(message) {
            errorMessage.textContent = message || 'An unknown error occurred.';
            errorScreen.classList.add('visible');
            overlay.classList.add('hidden');
            hideLoading();
        }

        function showHint() {
            hint.classList.remove('hidden');
        }

        function hideHint() {
            hint.classList.add('hidden');
        }

        // ==========================================
        // CHECK REQUIREMENTS
        // ==========================================
        function checkRequirements() {
            console.log('[AR] Checking requirements...');

            if (location.protocol !== 'https:' &&
                location.hostname !== 'localhost' &&
                location.hostname !== '127.0.0.1') {
                throw new Error('HTTPS required.\n\nPlease access this page via a secure connection (https://).');
            }

            if (!navigator.xr) {
                throw new Error('WebXR not supported.\n\nYour device does not support AR.\n\nTry Chrome on Android or Safari on iOS.');
            }

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                throw new Error('Camera API not supported.\n\nPlease use a modern browser.');
            }

            console.log('[AR] ✅ Requirements passed');
            return true;
        }

        // ==========================================
        // REQUEST CAMERA PERMISSION
        // ==========================================
        async function requestCameraPermission() {
            showLoading('Requesting camera access...');
            console.log('[AR] Requesting camera permission...');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });

                stream.getTracks().forEach(track => track.stop());
                console.log('[AR] ✅ Manual camera stream stopped');

                await new Promise(resolve => setTimeout(resolve, 500));
                console.log('[AR] ✅ Camera release delay complete');

                return true;

            } catch (err) {
                console.error('[AR] ❌ Camera permission error:', err);

                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    throw new Error('Camera permission denied.\n\nPlease allow camera access in your browser settings and reload.');
                } else if (err.name === 'NotFoundError') {
                    throw new Error('No camera found.\n\nPlease connect a camera and try again.');
                } else if (err.name === 'NotReadableError') {
                    throw new Error('Camera is temporarily unavailable.\n\nPlease close other apps using the camera and reload.');
                } else {
                    throw new Error('Camera error: ' + err.message);
                }
            }
        }

        // ==========================================
        // WAIT FOR WEBXR SESSION
        // ==========================================
        function waitForWebXR(timeout = 20000) {
            return new Promise((resolve, reject) => {
                showLoading('Starting WebXR...');
                console.log('[AR] Waiting for WebXR session...');

                const startTime = Date.now();

                function check() {
                    const xrSystem = scene.systems && scene.systems['webxr'];

                    if (xrSystem && xrSystem.session) {
                        console.log('[AR] ✅ WebXR session active');
                        resolve(xrSystem);
                        return;
                    }

                    if (Date.now() - startTime > timeout) {
                        reject(new Error('WebXR session timed out.\n\nMake sure your device supports AR.\n\nAndroid: Chrome with ARCore\niOS: Safari with ARKit'));
                        return;
                    }

                    setTimeout(check, 100);
                }

                check();
            });
        }

        // ==========================================
        // SETUP PLACEMENT EVENTS
        // ==========================================
        function setupPlacement() {
            // Show hint when container becomes visible (model placed)
            const observer = new MutationObserver(() => {
                if (container.getAttribute('visible') === 'true') {
                    hideHint();
                    hideLoading();
                    console.log('[AR] ✅ Mecha placed!');
                }
            });

            observer.observe(container, {
                attributes: true,
                attributeFilter: ['visible']
            });

            // If container is already visible
            if (container.getAttribute('visible') === 'true') {
                hideHint();
                hideLoading();
            }
        }

        // ==========================================
        // MAIN START
        // ==========================================
        async function startAR() {
            if (isARStarted) return;

            startBtn.disabled = true;
            startBtn.textContent = 'Starting...';
            console.log('[AR] 🚀 Starting WebXR...');

            try {
                showLoading('Checking device...');
                checkRequirements();

                await requestCameraPermission();

                overlay.classList.add('hidden');

                // Wait for WebXR session
                await waitForWebXR();

                // Setup placement
                setupPlacement();

                // Show hint
                setTimeout(showHint, 1000);

                // Hide hint after 8 seconds if not placed
                setTimeout(() => {
                    if (container.getAttribute('visible') !== 'true') {
                        hideHint();
                    }
                }, 8000);

                isARStarted = true;
                console.log('[AR] 🎉 WebXR ready! Tap screen to place mecha.');

            } catch (err) {
                console.error('[AR] ❌ Start error:', err);
                showError(err.message);
                startBtn.disabled = false;
                startBtn.textContent = 'Start AR';
            }
        }

        // ==========================================
        // EVENT LISTENERS
        // ==========================================
        startBtn.addEventListener('click', (e) => {
            e.preventDefault();
            console.log('[AR] 👆 Start button clicked');
            startAR();
        });

        reloadBtn.addEventListener('click', () => {
            console.log('[AR] 🔄 Reloading...');
            window.location.reload();
        });

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                console.log('[AR] 📱 Page hidden');
            } else {
                console.log('[AR] 📱 Page visible');
            }
        });

        // ==========================================
        // INITIAL STATE
        // ==========================================
        overlay.classList.remove('hidden');
        errorScreen.classList.remove('visible');
        loading.classList.add('hidden');
        hint.classList.add('hidden');

        console.log('[AR] 🚀 App initialized (WebXR)');
        console.log('[AR] 📱 Device must support ARCore/ARKit');
        console.log('[AR] 🤖 Model: mecha.glb with walking animation');

        // ==========================================
        // DEBUG TOOL
        // ==========================================
        window.ARDebug = {
            scene: function() {
                console.log('Scene:', document.getElementById('ar-scene'));
                console.log('Container:', document.getElementById('model-container'));
                console.log('Model:', document.getElementById('mecha-model'));
                console.log('XR System:', scene.systems?.webxr);
            },
            all: function() {
                console.log('🔍 ===== AR DEBUG =====');
                this.scene();
                console.log('🔍 ===== END =====');
            }
        };

    })();
    </script>

</body>
</html>

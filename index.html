<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🚗 AR Car Showroom</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      text-align: center;
      color: white;
      text-shadow: 0 0 20px rgba(0,0,0,0.9);
      z-index: 10;
      font-size: 0.9rem;
      background: rgba(0,0,0,0.6);
      padding: 12px;
      backdrop-filter: blur(5px);
      pointer-events: none;
    }
    #info a { color: #88ddff; pointer-events: auto; text-decoration: none; }
    #controls {
      position: absolute;
      bottom: 100px;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }
    #controls button {
      pointer-events: auto;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 12px 24px;
      margin: 5px;
      border-radius: 30px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    #controls button:active {
      transform: scale(0.95);
      background: rgba(255,255,255,0.3);
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 20px 40px;
      border-radius: 10px;
      z-index: 20;
      text-align: center;
    }
    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #ff6b6b;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 10px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="loader"></div>
    Loading your car...
  </div>

  <div id="controls">
    <button onclick="changeColor('red')">🔴 Red</button>
    <button onclick="changeColor('blue')">🔵 Blue</button>
    <button onclick="changeColor('green')">🟢 Green</button>
    <button onclick="changeColor('gold')">⭐ Gold</button>
    <button onclick="toggleSpin()">🔄 Spin</button>
  </div>

  <a-scene 
    embedded 
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
  >
    
    <!-- Lighting -->
    <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
    <a-light type="directional" color="#ffffff" intensity="1.0" position="2 5 3"></a-light>
    <a-light type="directional" color="#ffccaa" intensity="0.6" position="-2 3 -1"></a-light>
    
    <!-- HIRO Marker -->
    <a-marker type="pattern" url="https://raw.githack.com/AR-js-org/AR.js/master/data/data/patt.hiro">
      
      <!-- Your Car -->
      <a-entity id="car" 
        gltf-model="url(assets/models/car.glb)"
        scale="0.5 0.5 0.5"
        position="0 0 0"
        rotation="0 0 0"
      >
        <a-animation id="spinAnim" 
          attribute="rotation" 
          from="0 0 0" 
          to="0 360 0" 
          dur="10000" 
          repeat="indefinite" 
          easing="linear"
        ></a-animation>
      </a-entity>
      
      <!-- Showroom ground -->
      <a-circle color="#333" opacity="0.4" radius="1.2" position="0 0 0" rotation="-90 0 0" material="metalness: 0.5; roughness: 0.3"></a-circle>
      
      <!-- Glow ring -->
      <a-torus color="#ff6b6b" radius="0.9" arc="360" position="0 0.01 0" rotation="90 0 0" material="emissive: #ff6b6b; emissiveIntensity: 0.3; transparent: true; opacity: 0.6">
        <a-animation attribute="rotation" from="0 0 0" to="0 360 0" dur="5000" repeat="indefinite"></a-animation>
      </a-torus>
      
      <!-- Title -->
      <a-text value="🚗 My Dream Car" color="white" position="0 1.2 0" scale="0.4 0.4 0.4" align="center"></a-text>
      
    </a-marker>
    
    <a-entity camera></a-entity>
  </a-scene>

  <div id="info">
    📸 Scan the <strong>HIRO marker</strong> • Tap buttons below to customize!<br>
    <span style="opacity:0.6; font-size:0.8rem;">👉 <a href="https://raw.githack.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">Download HIRO marker</a></span>
  </div>

  <script>
    let isSpinning = true;
    let carColor = 'white';
    
    // Change car color
    function changeColor(color) {
      const car = document.getElementById('car');
      if (car) {
        car.setAttribute('material', `color: ${color}; emissive: ${color}; emissiveIntensity: 0.1`);
        carColor = color;
      }
    }
    
    // Toggle spin animation
    function toggleSpin() {
      const spinAnim = document.getElementById('spinAnim');
      if (spinAnim) {
        if (isSpinning) {
          spinAnim.pause();
          isSpinning = false;
        } else {
          spinAnim.play();
          isSpinning = true;
        }
      }
    }
    
    // Hide loading
    document.addEventListener('DOMContentLoaded', () => {
      const scene = document.querySelector('a-scene');
      if (scene) {
        scene.addEventListener('loaded', () => {
          document.getElementById('loading').style.display = 'none';
        });
      }
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
      }, 10000);
    });
  </script>
</body>
</html>

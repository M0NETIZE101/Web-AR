<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Marker AR · Car</title>
  <link rel="stylesheet" href="style.css">
  <!-- A-Frame & AR.js from CDN -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.4/aframe/build/aframe-ar.min.js"></script>
</head>
<body>
  <!-- Permission overlay -->
  <div id="permission-overlay">
    <h2>📷 Camera access</h2>
    <p>This experience needs camera access to work.<br>Please allow when prompted.</p>
    <button id="start-ar-btn">Start AR</button>
  </div>

  <!-- Error screen -->
  <div id="error-screen">
    <h2>⚠️ Camera unavailable</h2>
    <p>We couldn't access your camera. Permission denied or no camera found.</p>
    <div class="hint">🔧 Re-enable in browser settings &amp; reload.</div>
    <button id="reload-btn">🔄 Reload</button>
  </div>

  <!-- Loading indicator -->
  <div id="loading" class="hidden">
    <div class="spinner"></div>
    <span>Loading AR …</span>
  </div>

  <!-- Marker prompt -->
  <div id="marker-prompt">📍 Point your camera at the Hiro marker</div>

  <!-- A-Frame scene – arjs attribute present but sourceType='none' initially -->
  <a-scene
    id="ar-scene"
    embedded
    background="color: black"
    renderer="logarithmicDepthBuffer: true;"
    vr-mode-ui="enabled: false"
    arjs="sourceType: none; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3; preset: hiro;"
  >
    <a-marker id="hiro-marker">
      <a-entity
        gltf-model="url(car.glb)"
        scale="0.8 0.8 0.8"
        rotation="0 -90 0"
        position="0 0.5 0"
      ></a-entity>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <script src="app.js"></script>
</body>
</html>

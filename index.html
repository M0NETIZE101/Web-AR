<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AR Viewer</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* 
      CRITICAL ANDROID FIX 
      Force everything to strict fullscreen. 
      Prevents A-Frame from miscalculating height.
    */
    html, body {
      width: 100vw !important;
      height: 100vh !important;
      overflow: hidden !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
    }

    /* Hide A-Frame VR/Rotation UI */
    .a-enter-vr, .a-orientation-modal { display: none !important; }

    /* 
      CRITICAL ANDROID FIX 
      Force the 3D canvas to be fullscreen 
    */
    .a-scene,
    .a-scene .a-canvas,
    .a-scene canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 1 !important;
    }

    /* 
      CRITICAL ANDROID FIX 
      Force AR.js video background to be fullscreen.
      Without this, the video sits at 640x480 in the top-left corner.
    */
    video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 0 !important;
      /* Do NOT use object-fit: cover, it crops the video and breaks marker tracking */
    }

    /* ===== Overlay ===== */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
      transition: opacity 0.4s ease;
    }

    #overlay.hidden { opacity: 0; pointer-events: none; }

    .icon-box {
      width: 90px; height: 90px;
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      display: grid; place-items: center;
      font-size: 44px;
    }

    h1 { color: #fff; font-size: 22px; font-weight: 700; }
    .desc { color: rgba(255,255,255,0.45); font-size: 13px; text-align: center; max-width: 260px; line-height: 1.6; }

    .btn {
      border: none; width: 100%; max-width: 280px;
      padding: 15px; font-size: 15px; font-weight: 600;
      border-radius: 12px; cursor: pointer; -webkit-appearance: none;
      margin-top: 8px;
    }

    .btn-primary { background: #6C5CE7; color: #fff; }
    .btn-primary:active { opacity: 0.8; }
    .btn-primary:disabled { background: #4a3fb5; opacity: 0.6; }

    /* ===== Error ===== */
    #error {
      position: fixed; inset: 0; z-index: 1000;
      background: #0a0a1a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
    }
    #error.visible { opacity: 1; pointer-events: all; }
    #error h2 { color: #ff6b6b; font-size: 18px; }
    #error p { color: rgba(255,255,255,0.55); font-size: 12px; text-align: center; max-width: 260px; line-height: 1.6; white-space: pre-line; }
    .btn-secondary { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.2); max-width: 220px; }

    /* ===== Loading ===== */
    #loading {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.6);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    #loading.visible { opacity: 1; pointer-events: all; }
    .spin {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #6C5CE7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading span { color: #fff; font-size: 12px; }

    /* ===== Prompt ===== */
    #prompt {
      position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
      z-index: 100; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
      color: #fff; padding: 10px 22px; border-radius: 30px; font-size: 12px;
      border: 1px solid rgba(255,255,255,0.08); transition: all 0.3s ease;
    }
    #prompt.hidden { opacity: 0; transform: translateX(-50%) translateY(15px); pointer-events: none; }
  </style>
</head>
<body>

  <!-- Permission Overlay -->
  <div id="overlay">
    <div class="icon-box">📷</div>
    <h1>AR Viewer</h1>
    <p class="desc">Scan a Hiro marker to view 3D content in augmented reality.</p>
    <button id="start-btn" class="btn btn-primary">Start Camera</button>
  </div>

  <!-- Error Screen -->
  <div id="error">
    <div class="icon-box">⚠️</div>
    <h2>Camera Error</h2>
    <p id="err-msg">Could not access the camera.</p>
    <button id="retry-btn" class="btn btn-secondary">Try Again</button>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="spin"></div>
    <span id="load-txt">Starting...</span>
  </div>

  <!-- Marker Prompt -->
  <div id="prompt" class="hidden">Scan Hiro marker</div>

  <!-- NO SCENE IN HTML -->

  <script>
  (function() {
    "use strict";

    const overlay  = document.getElementById('overlay');
    const error    = document.getElementById('error');
    const errMsg   = document.getElementById('err-msg');
    const loading  = document.getElementById('loading');
    const loadTxt  = document.getElementById('load-txt');
    const prompt   = document.getElementById('prompt');
    const startBtn = document.getElementById('start-btn');
    const retryBtn = document.getElementById('retry-btn');

    let started = false;

    function showLoading(text) {
      loadTxt.textContent = text || 'Loading...';
      loading.classList.add('visible');
    }

    function hideLoading() { loading.classList.remove('visible'); }

    function showError(msg) {
      errMsg.textContent = msg;
      error.classList.add('visible');
      overlay.classList.add('hidden');
      hideLoading();
    }

    // ==========================================
    // CREATE SCENE DYNAMICALLY
    // ==========================================
    function createScene() {
      const scene = document.createElement('a-scene');
      
      // 'embedded' is CRITICAL here. It tells A-Frame NOT to apply its 
      // buggy fullscreen JS, letting our strict CSS take over instead.
      scene.setAttribute('embedded', '');
      scene.setAttribute('vr-mode-ui', 'enabled: false');
      scene.setAttribute('renderer', 'logarithmicDepthBuffer: true; alpha: true; precision: mediump');
      scene.setAttribute('loading-screen', 'enabled: false');
      scene.setAttribute('arjs', 
        'sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3; preset: hiro'
      );

      scene.innerHTML = `
        <a-assets timeout="15000">
          <a-asset-item id="car-model" src="car.glb"></a-asset-item>
        </a-assets>
        <a-marker id="ar-marker" preset="hiro" emitevents="true" smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="5">
          <a-entity id="car-entity" gltf-model="#car-model" scale="0.1 0.1 0.1" position="0 0.15 0" rotation="0 -90 0"></a-entity>
        </a-marker>
        <a-entity camera></a-entity>
      `;

      document.body.appendChild(scene);
      return scene;
    }

    // ==========================================
    // RELAXED WAIT FOR AR (Fixes Camera Error)
    // ==========================================
    function waitForAR(scene, timeout) {
      return new Promise((resolve, reject) => {
        const start = Date.now();
        
        function check() {
          // Just check if the system registered. 
          // DON'T dig into _arVideoSource (causes silent crashes on some Android versions)
          if (scene.systems && scene.systems['arjs']) {
            // Give it a brief moment to actually open the camera stream
            setTimeout(() => resolve(scene.systems['arjs']), 800);
            return;
          }
          
          if (Date.now() - start > timeout) {
            reject(new Error('Camera initialization timed out'));
            return;
          }
          
          requestAnimationFrame(check);
        }
        check();
      });
    }

    // ==========================================
    // SETUP EVENTS
    // ==========================================
    function setupEvents(scene) {
      const marker = document.getElementById('ar-marker');
      if (marker) {
        marker.addEventListener('markerFound', () => {
          prompt.classList.add('hidden');
          hideLoading();
        });
        marker.addEventListener('markerLost', () => {
          prompt.classList.remove('hidden');
        });
      }

      const model = document.getElementById('car-entity');
      if (model) {
        model.addEventListener('model-loaded', hideLoading);
        model.addEventListener('model-error', () => { hideLoading(); prompt.classList.remove('hidden'); });
      }

      // Force AR.js to recalculate sizes after fully loaded (Fixes half-screen)
      scene.addEventListener('loaded', () => {
        setTimeout(() => {
          window.dispatchEvent(new Event('resize'));
        }, 100);
      });

      scene.addEventListener('camera-error', () => {
        showError('Camera permission denied.\n\nPlease allow camera access in your browser settings and reload.');
      });
    }

    // ==========================================
    // MAIN START
    // ==========================================
    async function start() {
      if (started) return;
      started = true;
      startBtn.disabled = true;
      startBtn.textContent = 'Starting...';

      try {
        // 1. Check HTTPS
        if (location.protocol !== 'https:' && !['localhost', '127.0.0.1', ''].includes(location.hostname)) {
          throw new Error('HTTPS required. Please access via a secure URL.');
        }

        // 2. Hide overlay
        overlay.classList.add('hidden');
        showLoading('Requesting camera...');

        // 3. Create scene (triggers AR.js init inside user gesture)
        const scene = createScene();

        // 4. Setup listeners
        setupEvents(scene);

        // 5. Wait for AR
        showLoading('Initializing AR...');
        await waitForAR(scene, 15000);

        // 6. Done
        showLoading('Looking for marker...');
        prompt.classList.remove('hidden');
        setTimeout(hideLoading, 4000);

      } catch (err) {
        console.error(err);
        showError(err.message);
      }
    }

    // ==========================================
    // LISTENERS & INIT
    // ==========================================
    startBtn.addEventListener('click', (e) => { e.preventDefault(); start(); });
    retryBtn.addEventListener('click', () => location.reload());

    // Prevent Android zoom
    document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });
    document.addEventListener('touchmove', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

  })();
  </script>

</body>
</html>
